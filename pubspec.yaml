name: emergency_response
description: Smart Emergency Response & Incident Reporting App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Navigation
  go_router: ^13.0.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

  # Network Detection (for sync)
  connectivity_plus: ^5.0.2

  # Charts (for dashboard)
  fl_chart: ^0.66.0

  # UI Enhancements
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.2
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
